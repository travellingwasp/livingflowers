name: Daily Codex Operation

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Collect verified traffic metrics
        run: npm run metrics
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          SEARCH_CONSOLE_SITE_URL: ${{ vars.SEARCH_CONSOLE_SITE_URL || vars.SITE_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WEB_ANALYTICS_SITE_TAG: ${{ vars.CLOUDFLARE_WEB_ANALYTICS_SITE_TAG }}
      - name: Run OpenAI autonomous daily operation
        run: node scripts/autonomous-openai-run.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
      - name: Confirm daily operation produced an auditable record
        run: test -f "journal/$(TZ=Europe/Bucharest date +%F).md" && test -f data/daily-openai-report.md
      - run: npm run check
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://example.com' }}
      - name: Create daily pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/daily-traffic-experiment
          delete-branch: true
          commit-message: "Run daily traffic experiment update"
          title: "Daily traffic experiment update"
          body: |
            Automated daily operation using OpenAI API.

            The run writes its concise report to `data/daily-openai-report.md`.

            Review:
            - `data/experiment-state.json`
            - `data/content-inventory.json`
            - `journal/`
            - `LESSONS_LEARNED.md`
      - name: Enable auto-merge for daily pull request
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --squash
        env:
          GH_TOKEN: ${{ github.token }}
